<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-light);
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-md);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-box h1 {
            font-size: 1.75rem;
            color: var(--text-main);
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .error-msg {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            margin: 1.5rem 0;
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        .divider::before { margin-right: .5em; }
        .divider::after { margin-left: .5em; }
        .btn-full {
            width: 100%;
            padding: 0.85rem;
            font-size: 1rem;
            justify-content: center;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box scale-in">
            <div class="login-logo">
                <h1>SmartMart</h1>
            </div>

            {% if 'customer' in config.get('REGISTERED_BLUEPRINTS', []) %}
                <div class="subtitle">Welcome back! Please sign in to your account.</div>
                
                {% if error %}
                    <div class="error-msg">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" required placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn-primary btn-full">Sign In</button>
                </form>

                <div class="divider">Or</div>

                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <a href="/register" class="btn-secondary btn-full">Create an Account</a>
                </div>

            {% else %}
                <div class="subtitle">Authorized Personnel Portal</div>
                
                {% if error %}
                    <div class="error-msg">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="form-group">
                        <label>Employee ID / Username</label>
                        <input type="text" name="username" required placeholder="e.g., admin or staff">
                    </div>
                    <div class="form-group">
                        <label>Secure Password</label>
                        <input type="password" name="password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn-primary btn-full" style="background: var(--text-main); margin-top: 1rem;">System Login</button>
                </form>
            {% endif %}
            
        </div>
    </div>
</body>
</html>
